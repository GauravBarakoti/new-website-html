name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:   # lets you trigger manually from GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Inject Slack webhook secret
        run: |
          sed -i "s|__SLACK_WEBHOOK_URL__|${{ secrets.SLACK_WEBHOOK_URL }}|g" index.html
        # replaces the placeholder in index.html with the real URL — never stored in git

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload site files
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'   # uploads everything in this folder (index.html + assets)

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
