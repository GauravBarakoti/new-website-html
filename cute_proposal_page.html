
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');

  .proposal-wrap {
    min-height: 520px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #ffeef8 0%, #fff0f6 50%, #fde8f5 100%);
    border-radius: 20px;
    position: relative;
    overflow: hidden;
    font-family: 'Poppins', sans-serif;
    padding: 24px;
  }

  .hearts-bg {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    border-radius: 20px;
  }

  .float-heart {
    position: absolute;
    font-size: 18px;
    animation: floatUp linear infinite;
    opacity: 0.4;
  }

  @keyframes floatUp {
    0%   { transform: translateY(0) rotate(0deg); opacity: 0.4; }
    100% { transform: translateY(-540px) rotate(360deg); opacity: 0; }
  }

  .card {
    background: rgba(255,255,255,0.92);
    border-radius: 28px;
    padding: 44px 40px 40px;
    box-shadow: 0 12px 48px rgba(220,80,140,0.18);
    max-width: 420px;
    width: 100%;
    text-align: center;
    position: relative;
    z-index: 2;
    border: 1px solid rgba(220,80,140,0.12);
  }

  .emoji-big {
    font-size: 64px;
    display: block;
    margin-bottom: 12px;
    animation: wobble 2.5s ease-in-out infinite;
  }

  @keyframes wobble {
    0%,100% { transform: rotate(-6deg) translateY(0); }
    50%      { transform: rotate(6deg) translateY(-10px); }
  }

  .card h1 {
    font-size: 26px;
    font-weight: 700;
    color: #c4336e;
    margin: 0 0 8px;
    line-height: 1.3;
  }

  .card .sub {
    font-size: 14px;
    color: #b07090;
    margin: 0 0 32px;
    line-height: 1.6;
  }

  .btn-area {
    display: flex;
    gap: 16px;
    justify-content: center;
    align-items: center;
    min-height: 54px;
  }

  .yes-btn {
    background: linear-gradient(135deg, #ff6b9d, #e8376e);
    color: white;
    border: none;
    border-radius: 50px;
    padding: 14px 36px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Poppins', sans-serif;
    transition: transform 0.15s;
    box-shadow: 0 6px 20px rgba(232,55,110,0.35);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%,100% { box-shadow: 0 6px 20px rgba(232,55,110,0.35); }
    50%      { box-shadow: 0 6px 32px rgba(232,55,110,0.6); }
  }

  .yes-btn:hover { transform: scale(1.08); }

  .no-btn {
    background: #f4f4f4;
    color: #aaa;
    border: 1px solid #e0e0e0;
    border-radius: 50px;
    padding: 14px 28px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Poppins', sans-serif;
    transition: left 0.35s cubic-bezier(.22,.68,0,1.2), top 0.35s cubic-bezier(.22,.68,0,1.2);
    white-space: nowrap;
    position: relative;
  }

  .no-btn.flying {
    position: fixed;
    z-index: 999;
    transition: left 0.35s cubic-bezier(.22,.68,0,1.2), top 0.35s cubic-bezier(.22,.68,0,1.2);
  }

  .no-counter {
    font-size: 11px;
    color: #d4a0b8;
    margin-top: 14px;
    min-height: 16px;
    letter-spacing: 0.3px;
  }

  .success-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    animation: popIn 0.6s cubic-bezier(.17,.67,.4,1.4) forwards;
  }

  @keyframes popIn {
    0%   { transform: scale(0.5); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  .success-screen .big-emoji {
    font-size: 80px;
    margin-bottom: 14px;
    animation: wobble 2s ease-in-out infinite;
  }

  .success-screen h2 {
    font-size: 26px;
    font-weight: 700;
    color: #c4336e;
    margin: 0 0 10px;
  }

  .success-screen p {
    font-size: 15px;
    color: #b07090;
    line-height: 1.7;
  }

  .burst-heart {
    position: fixed;
    font-size: 24px;
    pointer-events: none;
    z-index: 1000;
    animation: burst 1.4s ease-out forwards;
  }

  @keyframes burst {
    0%   { transform: translate(0,0) scale(1); opacity: 1; }
    100% { transform: translate(var(--tx), var(--ty)) scale(0.3); opacity: 0; }
  }
</style>

<div class="proposal-wrap" id="wrap">
  <div class="hearts-bg" id="heartsBg"></div>

  <div class="card" id="mainCard">
    <div id="askScreen">
      <span class="emoji-big">🥺👉👈</span>
      <h1>Will you be mine? 💗</h1>
      <p class="sub">Sirf ek chhota sa "Yes" chahiye...<br/>soch lo achhe se 😌</p>
      <div class="btn-area" id="btnArea">
        <button class="yes-btn" id="yesBtn">Yes 💖</button>
        <button class="no-btn" id="noBtn">No 🙈</button>
      </div>
      <p class="no-counter" id="counter"></p>
    </div>

    <div class="success-screen" id="successScreen">
      <span class="big-emoji">🎉💞🥰</span>
      <h2>Yaaay! I knew it! 🥹</h2>
      <p>Tumne "Yes" bol diya —<br/>ab tum meri ho! 💕<br/><br/>
         Hamesha muskurate raho,<br/>kyunki tumhari smile hi meri duniya hai. 🌸✨</p>
    </div>
  </div>
</div>

<script>
  const yesBtn = document.getElementById('yesBtn');
  const noBtn  = document.getElementById('noBtn');
  const ask    = document.getElementById('askScreen');
  const suc    = document.getElementById('successScreen');
  const counter= document.getElementById('counter');
  const wrap   = document.getElementById('wrap');
  const bg     = document.getElementById('heartsBg');

  const syms = ['💖','💕','💗','🌸','✨','💝','🌷'];
  let noCount = 0;
  let angle = 0;
  let flying = false;

  function spawnBg() {
    const h = document.createElement('div');
    h.className = 'float-heart';
    h.textContent = syms[Math.floor(Math.random()*syms.length)];
    h.style.left = (Math.random()*100) + '%';
    h.style.bottom = '-30px';
    h.style.fontSize = (14 + Math.random()*16) + 'px';
    const dur = 6 + Math.random()*7;
    h.style.animationDuration = dur + 's';
    h.style.animationDelay = (Math.random()*3) + 's';
    bg.appendChild(h);
    setTimeout(() => h.remove(), (dur+3)*1000);
  }

  for(let i=0;i<8;i++) spawnBg();
  setInterval(spawnBg, 900);

  const msgs = [
    '', 'Sochna mat itna... 🥺', 'Please? 🌸', 'Ek chance do na 💕',
    'Itna bura bhi nahi hoon! 😅', 'Acha sorry sorry 🙏', 'PLEASEEE 🥹',
    'Thak gaya hoon bhaagna... 😭', 'Last chance, I promise! 💖'
  ];

  function moveNo() {
    noCount++;
    counter.textContent = msgs[Math.min(noCount, msgs.length-1)];

    if (!flying) {
      flying = true;
      noBtn.classList.add('flying');
      const r = noBtn.getBoundingClientRect();
      noBtn.style.left = r.left + 'px';
      noBtn.style.top  = r.top  + 'px';
      noBtn.style.width = r.width + 'px';
    }

    angle += (0.9 + Math.random() * 0.7);

    const btnW = noBtn.offsetWidth;
    const btnH = noBtn.offsetHeight;
    const margin = 20;

    const wRect = wrap.getBoundingClientRect();
    const cx = wRect.left + wRect.width/2;
    const cy = wRect.top  + wRect.height/2;
    const rx = Math.max(60, wRect.width/2  - btnW - margin);
    const ry = Math.max(40, wRect.height/2 - btnH - margin);

    let x = cx + Math.cos(angle) * rx - btnW/2;
    let y = cy + Math.sin(angle) * ry - btnH/2;

    x = Math.max(margin, Math.min(window.innerWidth  - btnW - margin, x));
    y = Math.max(margin, Math.min(window.innerHeight - btnH - margin, y));

    noBtn.style.left = x + 'px';
    noBtn.style.top  = y + 'px';
  }

  noBtn.addEventListener('mouseenter', moveNo);
  noBtn.addEventListener('touchstart', e => { e.preventDefault(); moveNo(); });
  noBtn.addEventListener('click', moveNo);

  function burstHearts() {
    const cx = window.innerWidth/2;
    const cy = window.innerHeight/2;
    for(let i=0;i<50;i++){
      setTimeout(()=>{
        const h = document.createElement('div');
        h.className = 'burst-heart';
        h.textContent = syms[Math.floor(Math.random()*syms.length)];
        h.style.left = cx + 'px';
        h.style.top  = cy + 'px';
        const ang = Math.random()*Math.PI*2;
        const dist = 80 + Math.random()*200;
        h.style.setProperty('--tx', Math.cos(ang)*dist+'px');
        h.style.setProperty('--ty', Math.sin(ang)*dist-150+'px');
        h.style.fontSize = (16+Math.random()*20)+'px';
        h.style.animationDuration = (1+Math.random()*0.8)+'s';
        document.body.appendChild(h);
        setTimeout(()=>h.remove(), 2500);
      }, i*28);
    }
  }

  yesBtn.addEventListener('click', ()=>{
    if(flying){
      noBtn.style.display='none';
    }
    ask.style.display = 'none';
    suc.style.display = 'flex';
    burstHearts();
  });
</script>
